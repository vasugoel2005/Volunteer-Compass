services:
  - type: web
    name: volunteer-compass-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-compass-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false   # Set this to your Vercel URL after deploying frontend
      - key: PORT
        value: 10000

databases:
  - name: volunteer-compass-db
    databaseName: volunteer_compass
    user: vc_user
    plan: free
