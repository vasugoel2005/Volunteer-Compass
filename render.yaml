services:
  - type: web
    name: volunteer-compass-api
    env: node
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-compass-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://volunteer-compass-tawny.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: volunteer-compass-db
    databaseName: volunteer_compass
    user: vc_user
    plan: free
